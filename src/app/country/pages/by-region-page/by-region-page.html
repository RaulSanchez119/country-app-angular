<div class="px-6 py-4">
  <h1 class="text-3xl font-bold">Por región</h1>
  <p class="text-gray-400 mt-1">Selecciona una región para explorar sus países</p>

  <section class="flex flex-wrap gap-2 mt-4">
    @for (region of regions; track region; let i = $index) {
    <button class="btn btn-lg btn-outline rounded-full px-6"
      [class]="selectedRegion() === region ? 'btn btn-lg ' + regionClasses[i] : 'btn btn-lg btn-outline'"
      (click)="selectedRegion.set(region)">
      {{ region }}
    </button>
    }
  </section>
</div>

<country-list [countries]="countryResource.value() ?? []" [errorMessage]="countryResource.error()"
  [isEmpty]="countryResource.value()?.length === 0" [isLoading]="countryResource.isLoading()" />
